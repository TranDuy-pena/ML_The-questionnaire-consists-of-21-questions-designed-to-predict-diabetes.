<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kết quả dự đoán</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;--shadow:0 10px 25px rgba(2,6,23,.06);--r:16px;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
    .wrap{max-width:980px;margin:28px auto;padding:0 16px 34px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
    .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start;}
    h1{margin:0;font-size:20px;}
    .muted{color:var(--muted);font-size:12px;line-height:1.4;margin-top:6px;}
    .barwrap{margin-top:10px;height:12px;border-radius:999px;background:#e5e7eb;border:1px solid #e5e7eb;overflow:hidden;}
    .bar{height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#2563eb);}
    .btn{display:inline-block;text-decoration:none;background:var(--brand);color:#fff;padding:10px 14px;border-radius:14px;font-weight:900;}
    table{width:100%;border-collapse:collapse;}
    td{padding:10px;border-bottom:1px solid #f1f5f9;font-size:13px;}
    td:first-child{color:var(--muted);width:52%;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <div>
        <h1>✅ Kết quả dự đoán</h1>

        <!-- ✅ ĐÃ XÓA: dòng hiển thị ngưỡng quyết định ở trang kết quả -->
        <!-- <div class="muted">Ngưỡng quyết định: <b>{{ threshold_show }}</b></div> -->

      </div>
    </div>

    <div style="margin-top:12px;">
      <div><b>Xác suất “Có nguy cơ”:</b> {{ "%.2f"|format(proba*100) }}%</div>
      <div class="barwrap"><div class="bar" id="bar"></div></div>

      <div class="muted" style="margin-top:8px;">
        * Công cụ hỗ trợ sàng lọc nguy cơ, không thay thế chẩn đoán y khoa.
      </div>

      <div style="margin-top:12px;">
        <a class="btn" href="/">← Làm lại khảo sát</a>
      </div>
    </div>
  </div>

  <div class="card">
    <h1 style="font-size:16px;margin-bottom:10px;">📌 Thông tin bạn đã nhập</h1>
    <table>
      {% for k, v in pretty.items() %}
        <tr>
          <td><b>{{ k }}</b></td>
          <td>{{ v }}</td>
        </tr>
      {% endfor %}
    </table>
  </div>
</div>

<script>
  const pct = Math.max(0, Math.min(100, {{ (proba*100)|round(2) }} ));
  document.getElementById("bar").style.width = pct + "%";
</script>
</body>
</html>
